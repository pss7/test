<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀번호재설정(완료)</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/reset.css">

    <script src="js/jquery-1.12.2.min.js"></script>
</head>

<body>

    <div id="wrap">
        <header id="header">
            <div class="container">
                <div class="header">
                    <div class="logo">
                        <h1>
                            <a href="#">
                                <img src="images/logo.png" alt="">
                            </a>
                        </h1>
                    </div>
                    <!-- //logo -->

                    <nav>
                        <ul class="depth1">
                            <li>
                                <h2>
                                    <a href="#">
                                        머신번역
                                    </a>
                                </h2>
                            </li>
                            <li>
                                <h2>
                                    <a href="#">
                                        엔터프라이즈
                                    </a>
                                </h2>
                            </li>
                            <li>
                                <h2>
                                    <a href="#">
                                        휴먼번역
                                    </a>
                                </h2>
                            </li>
                            <li>
                                <h2>
                                    <a href="#">
                                        요금제
                                    </a>
                                </h2>
                            </li>
                            <li>
                                <h2>
                                    <a href="#">
                                        블로그
                                    </a>
                                </h2>
                            </li>
                        </ul>
                    </nav>
                    <!-- //nav -->

                    <div class="right_box">
                        <a href="#" class="alarm">
                            <span class="blind">알림</span>
                        </a>
                        <a href="#" class="login">
                            <span class="blind">로그인</span>
                        </a>
                    </div>
                    <!-- //right_box -->

                    <button class="mobile_menu"><span class="blind">모바일 메뉴</span></button>
                    <button class="mobile_close"><span class="blind">모바일 메뉴 닫기</span></button>

                </div>
                <!-- //header -->

            </div>
            <!-- //container -->

        </header>
        <!-- //header -->
        <main id="login">
            <div class="container">
                <div class="login_wrap">

                    <div class="find_wrap">
                        <div class="new_password_box st">
                            <h3>
                                휴대폰 번호가 변경되었습니다
                            </h3>

                            <a href="#" class="com_find_btn">
                                개인 정보 수정으로
                            </a>
                        </div>
                        <!-- //new_password_box -->

                    </div>
                    <!-- //find_wrap -->

                </div>
                <!-- //login_wrap -->

            </div>
            <!-- //container -->

        </main>
        <!-- //main -->

    </div>
    <!-- //wrap -->

</body>

</html>
