<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비밀번호재설정</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/reset.css">

    <script src="js/jquery-1.12.2.min.js"></script>
</head>

<body>

    <div id="wrap">
        <main id="login">
            <div class="join_wrap">
                <div class="join_box">
                    <div class="join_left">
                        <ul>
                            <li>
                                <a href="#" class="active">
                                    <span>
                                        회원 유형
                                    </span>
                                </a>
                            </li>
                            <li>
                                <a href="#">
                                    <span>
                                        기본 정보
                                    </span>
                                </a>
                            </li>
                            <li>
                                <a href="#">
                                    <span>
                                        본인 인증
                                    </span>
                                </a>
                            </li>
                        </ul>
                    </div>
                    <!-- //join_left -->

                    <div class="join_right">
                        <div class="join_content_box">
                            <div class="join_content">
                                <h1>
                                    메타트랜스
                                </h1>
                                <p class="join_text_top">
                                    다양한 번역 문서도 메타트랜스에서 한번에 처리하세요
                                </p>
                                <ul class="join_link">
                                    <li>
                                        <a href="#">
                                            <span>
                                                개인으로 시작하기
                                            </span>
                                            <em>
                                                쉽게 번역을 요청하세요
                                            </em>
                                        </a>
                                    </li>
                                    <li>
                                        <a href="#">
                                            <span>
                                                번역사로 시작하기
                                            </span>
                                            <em>
                                                번역사로 활동하세요
                                            </em>
                                        </a>
                                    </li>
                                    <li>
                                        <a href="#">
                                            <span>
                                                기업회원으로 시작하기
                                            </span>
                                            <em>
                                                기업회원을 통해 다양한 해택을 누리세요
                                            </em>
                                        </a>
                                    </li>
                                </ul>
                                <p class="join_login">
                                    이미 계정이 있으신가요? <a href="#">로그인하기</a>
                                </p>

                            </div>
                            <!-- //join_content -->

                            <div class="join_content">
                                <div class="com_sns">
                                    <a href="#" class="naver"><span>네이버로 시작하기</span></a>
                                    <a href="#" class="kakao"><span>카카오로 시작하기</span></a>
                                </div>

                                <div class="join_input_box">
                                    <label for="1">
                                        이메일
                                        <span title="필수입력">*</span>
                                    </label>
                                    <div class="box">
                                        <input id="1" type="text" placeholder="이메일을 입력해 주세요">
                                        <label for="2" class="blind">
                                            인증번호
                                        </label>
                                        <a href="#" class="certification">
                                            인증번호 받기
                                        </a>
                                    </div>
                                    <div class="box">
                                        <input id="2" type="text" placeholder="인증번호 6자리 숫자 입력">
                                        <a href="#" class="certification">
                                            인증번호 받기
                                        </a>
                                    </div>
                                </div>
                                <!-- //join_input_box -->

                                <div class="join_input_box">
                                    <label for="3">
                                        비밀번호
                                        <span title="필수입력">*</span>
                                    </label>
                                    <input id="3" type="text" placeholder="6자리 이상 입력해 주세요">
                                </div>
                                <!-- //join_input_box -->

                                <div class="join_input_box">
                                    <label for="4">
                                        비밀번호 재입력
                                        <span title="필수입력">*</span>
                                    </label>
                                    <input id="4" type="text" placeholder="6자리 이상 입력해 주세요">
                                </div>
                                <!-- //join_input_box -->


                                <div class="join_agree_wrap">
                                    <div class="join_agree_box">
                                        <input id="5" type="checkbox" class="blind">
                                        <label for="5">모두 동의합니다</label>
                                    </div>
                                    <!-- //join_agree_box -->

                                    <div class="join_agree_box">
                                        <input id="6" type="checkbox" class="blind">
                                        <label for="6"><span>이용약관</span>에 동의합니다 (필수)</label>
                                    </div>
                                    <!-- //join_agree_box -->

                                    <div class="join_agree_box">
                                        <input id="7" type="checkbox" class="blind">
                                        <label for="7"><span>개인정보 수집 및 이용</span>에 동의합니다 (필수)</label>
                                    </div>
                                    <!-- //join_agree_box -->

                                    <div class="join_agree_box">
                                        <input id="8" type="checkbox" class="blind">
                                        <label for="8"><span>마케팅 정보 수신</span>에 동의합니다 </label>
                                    </div>
                                    <!-- //join_agree_box -->

                                </div>
                                <!-- //join_agree_wrap -->

                                <a href="#" class="com_find_btn">
                                    본인인증
                                </a>

                            </div>
                            <!-- //join_content -->

                        </div>
                        <!-- //join_content_box -->

                    </div>
                    <!-- //join_right -->

                </div>
                <!--//join_box -->

            </div>
            <!-- //join_wrap -->

        </main>
        <!-- //main -->

    </div>
    <!-- //wrap -->

    <script>
        $(function () {
            $('.join_content').hide();
            $('.join_content').first().show();
            $('.join_left ul li').click(function () {
                $('.join_left ul li a').removeClass('active');
                $(this).children().addClass('active');
                var Idx = $(this).index();
                $('.join_content').hide();
                $('.join_content').eq(Idx).show();
            });
        });
    </script>

</body>

</html>
