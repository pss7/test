<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/reset.css">

    <script src="js/jquery-1.12.2.min.js"></script>
</head>

<body>

    <div id="wrap">
        <main id="login">
            <div class="login_wrap">
                <div class="login_box">
                    <div class="login_left">
                        <p>
                            <span>메타트랜스 <em>업무</em></span> <br>
                            음성을 텍스트로, 텍스트를 음성으로<br>
                            영상 , 유튜브,음성 까지<br>
                            다양한 업무를 AI로 쉽게 할 수 있습니다
                        </p>
                        <p>
                            <span>메타트랜스 <em>번역</em></span> <br>
                            문서 번역부터 음성, 영상 , 유튜브까지 <br>
                            다양한 번역을 쉽게 할 수 있습니다
                        </p>
                    </div>
                    <!-- //login_left -->

                    <div class="login_right">
                        <h2>
                            로그인
                        </h2>
                        <div class="box">
                            <label for="">이메일</label>
                            <input type="text" placeholder="이메일 입력">
                        </div>
                        <div class="box">
                            <label for="">비밀번호</label>
                            <input type="text" placeholder="비밀번호 입력">
                        </div>
                        <div class="box">
                            <input id="auto" type="checkbox" class="blind">
                            <label for="auto" class="auto_login">자동 로그인</label>
                        </div>

                        <a href="#" class="login_box">로그인</a>

                        <ul class="find">
                            <li>
                                <a href="#">이메일 찾기</a>
                            </li>
                            <li>
                                <a href="#">비밀번호 재설정</a>
                            </li>
                        </ul>
                        <!-- //find -->

                        <div class="com_sns">
                            <a href="#" class="naver"><span>네이버로 시작하기</span></a>
                            <a href="#" class="kakao"><span>카카오로 시작하기</span></a>
                            <a href="#" class="google"><span>구글로 시작하기</span></a>
                        </div>
                        <!-- //sns -->

                        <a href="#" class="join">
                            회원가입
                        </a>

                    </div>
                    <!-- //login_right -->
                </div>

                <!-- //login_box -->

            </div>
            <!-- //login_wrap -->

        </main>
        <!-- //main -->

    </div>
    <!-- //wrap -->

</body>

</html>
